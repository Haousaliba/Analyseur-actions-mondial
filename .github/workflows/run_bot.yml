name: Analyseur Sectoriel Continu

on:
  schedule:
    - cron: '0 * * * *'  # S'exécute automatiquement TOUTES LES HEURES, 24h/24
  workflow_dispatch:     # Ajoute un bouton manuel pour lancer le scan quand tu veux

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4  # Mise à jour de v3 à v4 🚀

      - name: Configurer Python
        uses: actions/setup-python@v5  # Mise à jour de v4 à v5 🚀
        with:
          python-version: '3.10'

      - name: Installer les bibliothèques boursières
        run: |
          pip install yfinance pandas requests lxml

      - name: Exécuter l'Analyse Mondiale
        env:
          TOKEN_TELEGRAM: ${{ secrets.TOKEN_TELEGRAM }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python bot.py
