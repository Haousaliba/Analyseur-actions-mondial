name: Système de Scan Boursier Mondial Automatisé

on:
  schedule:
    # 06:00 UTC = 08:00 Heure de Paris (Avant l'ouverture européenne)
    - cron: '0 6 * * 1-5'
    # 16:00 UTC = 18:00 Heure de Paris (Clôture européenne)
    - cron: '0 16 * * 1-5'
    # 20:30 UTC = 22:30 Heure de Paris (Clôture américaine)
    - cron: '30 20 * * 1-5'
  workflow_dispatch:
    inputs:
      region:
        description: 'Zone à analyser (ALL, US, EU, ASIA, AU)'
        required: true
        default: 'ALL'

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du dépôt de code
        uses: actions/checkout@v4

      - name: Configuration de l'environnement Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installation des dépendances requises
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance requests lxml html5lib

      - name: Exécution du Bot d'Analyse (Top 5)
        env:
          TOKEN_TELEGRAM: ${{ secrets.TOKEN_TELEGRAM }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          REGION_TO_RUN="${{ github.event.inputs.region || 'ALL' }}"
          python bot.py --region $REGION_TO_RUN
