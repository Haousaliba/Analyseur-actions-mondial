name: Analyseur Sectoriel Continu

on:
  schedule:
    # 2h avant Sydney (21h00 UTC, soit 21h00 heure de Paris en hiver, à ajuster selon l'heure d'été)
    - cron: '0 21 * * 1-5'
    # 2h avant Tokyo (00h00 UTC, soit 00h00 heure de Paris)
    - cron: '0 0 * * 1-5'
    # 2h avant l'Europe (07h00 heure de Paris, soit 07h00 UTC ou 05h00 UTC selon l'heure d'été. En UTC standard : 07:00)
    - cron: '0 7 * * 1-5'
    # 2h avant Wall Street (13h30 heure de Paris, soit 13h30 UTC ou 11h30 UTC. En UTC standard : 13:30)
    - cron: '30 13 * * 1-5'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installer les bibliothèques
        run: |
          pip install yfinance pandas ta requests

      - name: Exécuter l'Analyse Mondiale
        env:
          TOKEN_TELEGRAM: ${{ secrets.TOKEN_TELEGRAM }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python bot.py
